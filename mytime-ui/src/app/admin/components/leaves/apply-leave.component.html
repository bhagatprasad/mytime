<div class="container-fluid py-3">
  <!-- AG Grid Section with Integrated Header -->
  <div class="row">
    <div class="col">
      <div class="card">

        <div class="admin-popup-overlay" *ngIf="showPopup">

          <div class="admin-popup">

            <div class="popup-header">
              <h4>Admin Comment</h4>
              <button class="close-icon" (click)="closePopup()">
                <i class="mdi mdi-close"></i>
              </button>
            </div>

            <div class="popup-body">

              <label class="form-label">
                Please enter the reason
              </label>

              <textarea [(ngModel)]="adminComment" class="comment-box" rows="4" placeholder="Type your comment here..."></textarea>

            </div>

            <div class="popup-footer">

              <button class="submit-btn" (click)="submitAction()">
                Submit
              </button>

              <button class="cancel-btn" (click)="closePopup()">
                Cancel
              </button>

            </div>

          </div>

        </div>
        <!-- Card Header with Title and Actions -->
        <div class="card-header bg-white border-bottom">
          <div class="d-flex justify-content-between align-items-center py-1">
            <!-- Left: Title -->
            <div class="d-flex align-items-center">
              <h5 class="mb-0">
                <i class="mdi mdi-account-group text-primary me-2"></i>
                Leave Management
              </h5>
              <span class="badge bg-light text-dark ms-3">
                <span class="text-primary fw-bold">{{ getTotalRowsCount() }}</span> leaves
              </span>
            </div>
            <!-- Right: Search and Actions -->
            <div class="d-flex align-items-center gap-2">
              <!-- Action Buttons -->
              <div class="d-flex gap-2 ms-3">
              </div>
            </div>
          </div>
        </div>

        <!-- Card Body with Grid -->
        <div class="card-body p-0">
          <!-- AG Grid -->
          <div *ngIf="rowData.length > 0" class="ag-grid-container">
            <ag-grid-angular style="width: 100%; height: 640px;" class="ag-theme-alpine" [rowData]="rowData"
              [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [gridOptions]="gridOptions"
              (cellClicked)="onCellClicked($event)" (gridReady)="onGridReady($event)" [pagination]="true"
              [paginationPageSize]="20" [suppressCellFocus]="true" [animateRows]="true" [rowSelection]="'single'"
              [domLayout]="isMobile ? 'autoHeight' : 'normal'">
            </ag-grid-angular>
          </div>

          <!-- Grid Footer Stats -->
          <div *ngIf="rowData.length > 0" class="card-footer bg-white border-top">
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex gap-3">
                <small class="text-muted">
                  <span class="fw-medium">{{ getTotalRowsCount() }}</span> total
                </small>
                <small class="text-muted">
                  <i class="mdi mdi-check-circle-outline text-success me-1"></i>
                  <span class="fw-medium">{{ getActiveRolesCount() }}</span> active
                </small>
                <small class="text-muted">
                  <i class="mdi mdi-close-circle-outline text-danger me-1"></i>
                  <span class="fw-medium">{{ getInactiveRolesCount() }}</span> inactive
                </small>
              </div>
              <small class="text-muted">
                <i class="mdi me-1" [class.mdi-cellphone]="isMobile" [class.mdi-monitor]="!isMobile"></i>
                {{ isMobile ? 'Mobile' : 'Desktop' }}
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
