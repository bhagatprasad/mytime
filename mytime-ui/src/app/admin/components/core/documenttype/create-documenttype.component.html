<!-- Overlay -->
<div class="sidebar-overlay" *ngIf="isVisible" (click)="close()"></div>

<!-- Sidebar -->
<div class="sidebar" [class.visible]="isVisible">
  <form [formGroup]="documentForm" (ngSubmit)="onSubmit()">
    <div class="sidebar-header">
      <h5 class="sidebar-title">
        {{ documenttype?.Id ? "Edit DocumentType" : "Add DocumentType" }}
      </h5>
      <button type="button" class="close" (click)="close()" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="sidebar-body">
      <div class="form-group">
        <label for="Name">DocumentType Name</label>
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text">
              <i class="mdi mdi-account-circle-outline"></i>
            </span>
          </div>
          <input
            type="text"
            class="form-control"
            id="Name"
            formControlName="Name"
            placeholder="Enter documenttype name"
          />
        </div>
        <!-- Validation messages for Name field -->
        <div
          *ngIf="
            documentForm.get('Name')?.invalid &&
            documentForm.get('Name')?.touched
          "
          class="text-danger small mt-1"
        >
          <span *ngIf="documentForm.get('Name')?.errors?.['required']">
            DocumentType name is required
          </span>
          <span *ngIf="documentForm.get('Name')?.errors?.['maxlength']">
            DocumentType name cannot exceed
            {{
              documentForm.get("Name")?.errors?.["maxlength"]?.requiredLength
            }}
            characters
          </span>
        </div>
      </div>
    </div>
    <div class="sidebar-footer">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="documentForm.invalid || documentForm.pristine"
      >
        <i
          class="mdi"
          [class.mdi-content-save]="!documenttype?.Id"
          [class.mdi-pencil]="documenttype?.Id"
        ></i>
        {{ documenttype?.Id ? "Update" : "Save" }}
      </button>
      <button type="button" class="btn btn-secondary ml-2" (click)="close()">
        Cancel
      </button>
    </div>
  </form>
</div>
