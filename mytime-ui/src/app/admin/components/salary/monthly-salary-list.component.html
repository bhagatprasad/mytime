<div class="container-fluid py-3">
  <!-- AG Grid Section with Integrated Header -->
  <div class="row">
    <div class="col">
      <div class="card">
        <!-- Card Header with Title and Actions -->
        <div class="card-header bg-white border-bottom">
          <div class="d-flex justify-content-between align-items-center py-1">
            <!-- Left: Title -->
            <div class="d-flex align-items-center">
              <h5 class="mb-0">
                <i class="mdi mdi-account-group text-primary me-2"></i>
                Monthly Salaries
              </h5>
              <span class="badge bg-light text-dark ms-3">
                <span class="text-primary fw-bold">{{ getTotalRowsCount() }}</span>
              </span>
            </div>

            <!-- Right: Search and Actions -->
            <div class="d-flex align-items-center gap-2">
              <!-- Action Buttons -->
              <div class="d-flex gap-2 ms-3">
                <!-- Add Button -->
                <a 
                  class="d-flex align-items-center"
                  (click)="openAddMonthlySalary()"
                  title="Add new monthly salary"
                >
                  <i class="mdi mdi-plus-circle-outline me-1"></i>
              </a>
              </div>
            </div>
          </div>
        </div>

        <!-- Card Body with Grid -->
        <div class="card-body p-0">
          <!-- AG Grid -->
          <div *ngIf="monthlySalaries.length > 0" class="ag-grid-container">
            <ag-grid-angular
              style="width: 100%; height: 640px;"
              class="ag-theme-alpine"
              [rowData]="monthlySalaries"
              [columnDefs]="columnDefs"
              [defaultColDef]="defaultColDef"
              [gridOptions]="gridOptions"
              (gridReady)="onGridReady($event)"
              [pagination]="true"
              [paginationPageSize]="20"
              [suppressCellFocus]="true"
              [animateRows]="true"
              [rowSelection]="'single'"
              [domLayout]="isMobile ? 'autoHeight' : 'normal'"
            >
            </ag-grid-angular>
          </div>

          <!-- Grid Footer Stats -->
          <div *ngIf="monthlySalaries.length > 0" class="card-footer bg-white border-top">
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex gap-3">
                <small class="text-muted">
                  <span class="fw-medium">{{ getTotalRowsCount() }}</span> total
                </small>
              </div>
              <small class="text-muted">
                <i class="mdi me-1" [class.mdi-cellphone]="isMobile" [class.mdi-monitor]="!isMobile"></i>
                {{ isMobile ? 'Mobile' : 'Desktop' }}
              </small>
            </div>
          </div>

          <app-monthly-salary-add [isVisible]="showSidebar" [monthlySalary]="selectedMonthlySalary"  (closeSidebar)="onCloseSidebar()" (saveMonthlySalary)="onSaveMonthlySalary($event)"></app-monthly-salary-add>
        </div>
         <!-- <app-create-country [isVisible]="showSidebar" [country]="selectedCountry"  (closeSidebar)="onCloseSidebar()" (saveCountry)="onSaveCountry($event)"></app-create-country>
         <app-delete-confirmation
  *ngIf="showDeletePopup"
  title="Delete Country"
  message="Do you really want to delete this country?"
  (confirm)="confirmDelete()"
  (cancel)="closePopup()">
</app-delete-confirmation> -->
      </div>
    </div>
  </div>
</div>
