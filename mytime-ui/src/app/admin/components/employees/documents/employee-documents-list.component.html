<div class="row">
    <div class="col">
        <div class="card">
            <div class="card-header bg-white border-bottom">
                <div class="d-flex justify-content-between align-items-center py-1">
                    <div class="d-flex align-items-center">
                        <h5 class="mb-0">
                            <i class="mdi mdi-file-document-outline text-primary me-2"></i>
                            Documents
                        </h5>
                        <span class="badge bg-light text-dark ms-3">
                            <i class="mdi mdi-file-document me-1 text-primary"></i>
                            <span class="text-primary fw-bold">{{ getTotalRowsCount() }}</span> records
                        </span>
                    </div>
                </div>
            </div>

            <div class="card-body p-0">
                <!-- Grid Container -->
                <div *ngIf="documents.length > 0" class="ag-grid-container">
                    <ag-grid-angular style="width: 100%; height: 640px;" class="ag-theme-alpine"
                        [rowData]="documents" 
                        [columnDefs]="columnDefs" 
                        [defaultColDef]="defaultColDef"
                        [gridOptions]="documentsGridOptions" 
                        (gridReady)="onGridReady($event)" 
                        (firstDataRendered)="onFirstDataRendered($event)"
                        [pagination]="true"
                        [paginationPageSize]="10" 
                        [paginationPageSizeSelector]="[10, 20, 50, 100]"
                        [suppressCellFocus]="true" 
                        [animateRows]="true"
                        [rowSelection]="'single'" 
                        [domLayout]="isMobile ? 'autoHeight' : 'normal'"
                        [enableCellTextSelection]="true" 
                        [ensureDomOrder]="true">
                    </ag-grid-angular>
                </div>

                <!-- Empty State -->
                <div *ngIf="documents.length === 0" class="text-center py-5">
                    <i class="mdi mdi-file-document-outline text-muted" style="font-size: 3rem;"></i>
                    <h5 class="text-muted mt-3">No documents records found</h5>
                    <p class="text-muted">No documents have been uploaded yet</p>
                </div>

                <!-- Footer -->
                <div *ngIf="documents.length > 0" class="card-footer bg-white border-top">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="d-flex gap-3">
                            <small class="text-muted">
                                <i class="mdi mdi-file-document me-1"></i>
                                <span class="fw-medium">{{ getTotalRowsCount() }}</span> total
                            </small>
                            <small class="text-muted">
                                <i class="mdi mdi-check-circle-outline text-success me-1"></i>
                                <span class="fw-medium">{{ getActiveDocumentsCount() }}</span> active
                            </small>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <small class="text-muted">
                                <i class="mdi me-1" [class.mdi-cellphone]="isMobile"
                                    [class.mdi-monitor]="!isMobile"></i>
                                {{ isMobile ? 'Mobile' : 'Desktop' }} view
                            </small>
                            <button class="btn btn-sm btn-outline-secondary border-0" (click)="refreshData()" 
                                    title="Refresh data">
                                <i class="mdi mdi-refresh"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
