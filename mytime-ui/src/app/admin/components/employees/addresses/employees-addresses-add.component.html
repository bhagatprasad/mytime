<!-- Overlay -->
<div class="sidebar-overlay" *ngIf="isVisible" (click)="onClose()"></div>

<!-- Sidebar -->
<div class="sidebar" [class.visible]="isVisible">
    <form [formGroup]="addressForm" (ngSubmit)="onSubmit()" novalidate>
        <!-- Header -->
        <div class="sidebar-header">
            <h5 class="sidebar-title">
                {{ employeeAddress ? 'Edit Address' : 'Add Address' }}
            </h5>
            <button type="button" class="close" (click)="onClose()">
                <span>&times;</span>
            </button>
        </div>

        <!-- Body -->
        <div class="sidebar-body">
            <div class="form-group">
                <label>Country *</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text">
                            <i class="mdi mdi-earth"></i>
                        </span>
                    </div>
                    <select class="form-control" formControlName="CountryId" (change)="onCountryChange()" >
                        <option [ngValue]="null">Select Country</option>
                        <option *ngFor="let c of countries" [ngValue]="c.Id">
                            {{ c.Name }}
                        </option>
                    </select>
                </div>
                <small class="text-danger"
                    *ngIf="addressForm.get('ContryId')?.invalid && (addressForm.get('CountryId')?.touched || addressForm.get('CountryId')?.dirty)">
                    Country is required
                </small>
            </div>

            <div class="form-group">
                <label>State *</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text">
                            <i class="mdi mdi-office-building"></i>
                        </span>
                    </div>
                    <select class="form-control" formControlName="StateId" (change)="onStateChange()"  >
                        <option [ngValue]="null">Select State</option>
                        <option *ngFor="let c of states" [ngValue]="c.StateId">
                            {{ c.Name }}
                        </option>
                    </select>
                </div>
                <small class="text-danger"
                    *ngIf="addressForm.get('StateId')?.invalid && (addressForm.get('StateId')?.touched || addressForm.get('StateId')?.dirty)">
                    State is required
                </small>
            </div>

            <div class="form-group">
                <label>City *</label>
                <div class="input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text">
                            <i class="mdi mdi-office-building"></i>
                        </span>
                    </div>
                    <select class="form-control" formControlName="CityId"  >
                        <option [ngValue]="null">Select City</option>
                        <option *ngFor="let c of cities" [ngValue]="c.Id">
                            {{ c.Name }}
                        </option>
                    </select>
                </div>
                <small class="text-danger"
                    *ngIf="addressForm.get('CityId')?.invalid && (addressForm.get('CityId')?.touched || addressForm.get('CityId')?.dirty)">
                    City is required
                </small>
            </div>

            <div class="form-group">
                <!-- Name -->
                <div class="form-group mb-3">
                    <label class="form-label">H No <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="mdi mdi-home-map-marker"></i>
                        </span>
                        <input type="text" class="form-control" formControlName="HNo"
                             placeholder="Enter Ho">
                    </div>
                    <!-- <div *ngIf="isFieldInvalid('Name')" class="text-danger small">
                        Name is required
                    </div> -->
                </div>

              

                 <div class="form-group mb-3">
                    <label class="form-label">AddressLine 1</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="mdi mdi-google-maps"></i>
                        </span>
                        <input type="text" class="form-control" formControlName="AddressLineOne"
                            placeholder="Enter address line one">
                    </div>
                    <!-- <div *ngIf="isFieldInvalid('Name')" class="text-danger small">
                        Name is required
                    </div> -->
                </div>

                   <div class="form-group mb-3">
                    <label class="form-label">AddressLine 2</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="mdi mdi-google-maps"></i>
                        </span>
                        <input type="text" class="form-control" formControlName="AddressLineTwo"
                           placeholder="Enter address line two">
                    </div>
                    <!-- <div *ngIf="isFieldInvalid('Name')" class="text-danger small">
                        Name is required
                    </div> -->
                </div>

                <div class="form-group mb-3">
                    <label class="form-label">Landmark</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="mdi mdi-map-marker-multiple"></i>
                        </span>
                        <input type="text" class="form-control" formControlName="Landmark"
                           placeholder="Enter landmark">
                    </div>
                    <!-- <div *ngIf="isFieldInvalid('Name')" class="text-danger small">
                        Name is required
                    </div> -->
                </div>
                <div class="form-group mb-3">
                    <label class="form-label">Zip code<span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="mdi mdi-home-map-marker"></i>
                        </span>
                        <input type="text" class="form-control" formControlName="Zipcode"
                             placeholder="Enter Zipcode">
                    </div>
                    <!-- <div *ngIf="isFieldInvalid('Name')" class="text-danger small">
                        Name is required
                    </div> -->
                </div>
                
            </div>
        </div>

        <!-- Footer -->
        <div class="sidebar-footer">
            <button type="submit" class="btn btn-primary" [disabled]="addressForm.invalid">
                <i class="mdi mdi-content-save"></i>
                {{ employeeAddress ? 'Update' : 'Save' }}
            </button>
            <button type="button" class="btn btn-secondary ms-2" (click)="onClose()">
                <i class="mdi mdi-close"></i>
                Cancel
            </button>
        </div>
    </form>
</div>
