<div class="container-fluid py-3">
  <div class="row">
    <div class="col">
      <div class="card">
        <!-- Card Header -->
        <div class="card-header bg-white border-bottom">
          <div class="d-flex justify-content-between align-items-center py-1">
            <!-- Left: Title -->
            <div class="d-flex align-items-center">
              <h5 class="mb-0">
                <i class="mdi mdi-account-group text-primary me-2"></i>
                Attnedance
              </h5>
              <span class="badge bg-light text-dark ms-3">
                <span class="text-primary fw-bold">{{ getTotalRowsCount() }}</span>
              </span>
            </div>

            <!-- Right: Search and Actions -->
            <div class="d-flex align-items-center gap-2">
              <!-- Action Buttons -->
              <div class="d-flex gap-2 ms-3">
                <!-- Add Button -->
                <a class="d-flex align-items-center" (click)="openAddAttendenceSideBar()" title="Add new country">
                  <i class="mdi mdi-plus-circle-outline me-1"></i>
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- Card Body -->
        <div class="card-body p-0">
          <div  class="ag-grid-container">
            <ag-grid-angular style="width: 100%; height: 640px;" class="ag-theme-alpine" [rowData]="employeeAttendence"
              [columnDefs]="columnDefs" [defaultColDef]="defaultColDef" [gridOptions]="gridOptions"
              (gridReady)="onGridReady($event)" [pagination]="true" [paginationPageSize]="20" [suppressCellFocus]="true"
              [animateRows]="true" [rowSelection]="'single'" [domLayout]="isMobile ? 'autoHeight' : 'normal'">
            </ag-grid-angular>
          </div>
          <app-create-attendence [isVisible]="showAttendenceView" [employeeId]="employeeId" [isMobile]="isMobile" [attendence]="selectedAttendence"
            (saveAttendance)="onSaveAttendance($event)" (closeSidebar)="showAttendenceView = false">
          </app-create-attendence>
        </div>

        <!-- Card Footer -->
        <div *ngIf="employeeAttendence.length > 0" class="card-footer bg-white border-top">
          <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted">
              <span class="fw-medium">{{ getTotalRowsCount() }}</span> total records
            </small>
            <small class="text-muted">
              <i class="mdi me-1" [class.mdi-cellphone]="isMobile" [class.mdi-monitor]="!isMobile"></i>
              {{ isMobile ? 'Mobile' : 'Desktop' }}
            </small>
          </div>
        </div>


      </div>
    </div>
  </div>
</div>
