<div class="container-fluid py-3">
  <div class="row">
    <div class="col">
      <div class="card">

        <!-- Card Header -->
        <div class="card-header bg-white border-bottom">
          <div class="d-flex justify-content-between align-items-center py-1">
            <div class="d-flex align-items-center">
              <h5 class="mb-0">
                <i class="mdi mdi-file-document-outline text-primary me-2"></i>Attnedence
              </h5>
              <span class="badge bg-light text-dark ms-3">
                <span class="text-primary fw-bold">{{ getTotalRowsCount() }}</span>
              </span>
            </div>
          </div>
        </div>

        <!-- Card Body -->
        <div class="card-body p-0">
          <div *ngIf="employeeAttendence.length > 0" class="ag-grid-container">
            <ag-grid-angular
              style="width: 100%; height: 640px;"
              class="ag-theme-alpine"
              [rowData]="employeeAttendence"
              [columnDefs]="columnDefs"
              [defaultColDef]="defaultColDef"
              [gridOptions]="gridOptions"
              (gridReady)="onGridReady($event)"
              [pagination]="true"
              [paginationPageSize]="20"
              [suppressCellFocus]="true"
              [animateRows]="true"
              [rowSelection]="'single'"
              [domLayout]="isMobile ? 'autoHeight' : 'normal'">
            </ag-grid-angular>
          </div>

          <!-- Empty state -->
          <div *ngIf="employeeAttendence?.length === 0" class="text-center py-5">
            <i class="mdi mdi-file-document-outline mdi-48px text-muted d-block mb-3"></i>
            <p class="text-muted">No attendence records found.</p>
          </div>
        </div>

        <!-- Card Footer -->
        <div *ngIf="employeeAttendence.length > 0" class="card-footer bg-white border-top">
          <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted">
              <span class="fw-medium">{{ getTotalRowsCount() }}</span> total records
            </small>
            <small class="text-muted">
              <i class="mdi me-1"
                 [class.mdi-cellphone]="isMobile"
                 [class.mdi-monitor]="!isMobile"></i>
              {{ isMobile ? 'Mobile' : 'Desktop' }}
            </small>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
