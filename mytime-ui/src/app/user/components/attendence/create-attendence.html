<!-- Overlay -->
<div class="sidebar-overlay" *ngIf="isVisible" (click)="close()"></div>

<!-- Sidebar -->
<div class="sidebar" [class.visible]="isVisible">
  <form [formGroup]="attendanceForm" (ngSubmit)="onSubmit()">
    <div class="sidebar-header">
      <h5 class="sidebar-title">
        {{ isCheckedIn ? 'Attendance Log Out' : 'Attendance Log In' }}
      </h5>
      <button type="button" class="close" (click)="close()" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>

    <div class="sidebar-body">
      <!-- Work Type Field -->
      <div class="form-group">
        <label for="WorkType">Work Type</label>
        <div class="input-group">
          <div class="input-group-append">
            <span class="input-group-text">▼</span>
          </div>
          <select class="form-control" id="WorkType" formControlName="WorkType">
            <option value="">Select WorkType</option>
            <option value="WFH">Work From Home</option>
            <option value="Office">Office</option>
            <option value="Hybrid">Hybrid</option>
          </select>

        </div>
        <small *ngIf="attendanceForm.get('WorkType')?.touched && attendanceForm.get('WorkType')?.invalid"
          class="text-danger">
          Work Type is required
        </small>
      </div>

      <!-- Check-In Time Field -->
      <div class="form-group">
        <label for="CheckInTime">Check-In Time</label>
        <div class="input-group">
          <div class="input-group-append">
            <button type="button" class="btn btn-outline-secondary" (click)="timeInput.showPicker()">⏰</button>
          </div>
          <input type="time" class="form-control" id="CheckInTime" formControlName="CheckInTime" #timeInput />
        </div>
        <!-- Removed duplicate Work Type validation message -->
      </div>
      <!-- Description Field -->
      <div class="form-group">
        <label for="Description">Description</label>
        <div class="input-group align-items-start">
          <div class="input-group-prepend">
            <span class="input-group-text">📝</span>
          </div>
          <textarea class="form-control" id="Description" formControlName="Description" rows="3"
            placeholder="Enter description">
                    </textarea>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button type="submit" class="btn btn-primary" [disabled]="attendanceForm.invalid">
        <i class="mdi" [class.mdi-login]="!isCheckedIn" [class.mdi-logout]="isCheckedIn"></i>
        {{ isCheckedIn ? 'Confirm Check-Out' : 'Confirm Check-In' }}
      </button>
      <button *ngIf="!isMobile" type="button" class="btn btn-secondary ml-2" (click)="close()">Cancel</button>
    </div>
  </form>
</div>
