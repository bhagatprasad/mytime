<!-- Overlay -->
<div class="sidebar-overlay" *ngIf="isVisible" (click)="close()"></div>

<!-- Sidebar -->
<div class="sidebar" [class.visible]="isVisible">
  <form [formGroup]="attendanceForm" (ngSubmit)="onSubmit()">
    <div class="sidebar-header">
      <h5 class="sidebar-title">
        {{ attendence?.AttendenceId ? 'Attendance Log Out' : 'Attendance Log In' }}
      </h5>
      <button type="button" class="close" (click)="close()" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>

    <div class="sidebar-body">
      <!-- Date Field - Disabled for Edit Mode -->
      <div class="form-group">
        <label for="AttendanceDate">Date</label>
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text">📅</span>
          </div>
          <input 
            type="date" 
            class="form-control" 
            id="AttendanceDate" 
            formControlName="AttendanceDate"
            [max]="maxDate"
            [min]="minDate"
            [disabled]="isEditMode"
          />
        </div>
        <small *ngIf="attendanceForm.get('AttendanceDate')?.touched && attendanceForm.get('AttendanceDate')?.invalid && !isEditMode"
          class="text-danger">
          <span *ngIf="attendanceForm.get('AttendanceDate')?.errors?.['required']">
            Date is required
          </span>
          <span *ngIf="attendanceForm.get('AttendanceDate')?.errors?.['futureDate']">
            Cannot select future dates (tomorrow onwards)
          </span>
        </small>
      </div>

      <!-- Work Type Field - Always Enabled -->
      <div class="form-group">
        <label for="WorkType">Work Type</label>
        <div class="input-group">
          <div class="input-group-append">
            <span class="input-group-text">▼</span>
          </div>
          <select class="form-control" id="WorkType" formControlName="WorkType">
            <option value="">Select WorkType</option>
            <option value="WFH">Work From Home</option>
            <option value="Office">Office</option>
            <option value="Hybrid">Hybrid</option>
          </select>
        </div>
        <small *ngIf="attendanceForm.get('WorkType')?.touched && attendanceForm.get('WorkType')?.invalid"
          class="text-danger">
          Work Type is required
        </small>
      </div>

      <!-- Check-In Time Field - Always Required -->
      <div class="form-group">
        <label for="CheckInTime">Check-In Time</label>
        <div class="input-group">
          <div class="input-group-append">
            <button type="button" class="btn btn-outline-secondary" (click)="openTimePicker('checkInTime')">⏰</button>
          </div>
          <input 
            type="time" 
            class="form-control" 
            id="CheckInTime" 
            formControlName="CheckInTime"
            step="60"
            pattern="[0-9]{2}:[0-9]{2}"
            (input)="validateTimeFormat('CheckInTime')"
          />
        </div>
        <small *ngIf="attendanceForm.get('CheckInTime')?.touched && attendanceForm.get('CheckInTime')?.invalid"
          class="text-danger">
          Check-In time is required
        </small>
      </div>

      <!-- Check-Out Time Field - Only in Edit Mode -->
      <div class="form-group" *ngIf="isEditMode">
        <label for="CheckOutTime">Check-Out Time</label>
        <div class="input-group">
          <div class="input-group-append">
            <button type="button" class="btn btn-outline-secondary" (click)="openTimePicker('checkOutTime')">⏰</button>
          </div>
          <input 
            type="time" 
            class="form-control" 
            id="CheckOutTime" 
            formControlName="CheckOutTime"
            step="60"
            pattern="[0-9]{2}:[0-9]{2}"
            (input)="validateTimeFormat('CheckOutTime')"
          />
        </div>
        <small class="text-muted">Optional - Leave blank if not checked out yet</small>
      </div>

      <!-- Description Field -->
      <div class="form-group">
        <label for="Description">Description</label>
        <div class="input-group align-items-start">
          <div class="input-group-prepend">
            <span class="input-group-text">📝</span>
          </div>
          <textarea class="form-control" id="Description" formControlName="Description" rows="3"
            placeholder="Enter description">
          </textarea>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button type="submit" class="btn btn-primary" [disabled]="attendanceForm.invalid">
        <i class="mdi" [class.mdi-login]="!attendence?.AttendenceId" [class.mdi-logout]="attendence?.AttendenceId"></i>
        {{ attendence?.AttendenceId ? 'Confirm Check-Out' : 'Confirm Check-In' }}
      </button>
      <button *ngIf="!isMobile" type="button" class="btn btn-secondary ml-2" (click)="close()">Cancel</button>
    </div>
  </form>
</div>
