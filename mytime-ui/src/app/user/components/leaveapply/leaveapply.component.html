<div class="leave-container">
  <h3 class="page-title">
    <i class="fa fa-calendar"></i> Leave Management
  </h3>

  <!-- DASHBOARD -->

  <div class="dashboard-row">

    <div class="dashboard-card total-card">
      <p>Total</p>
      <h4>{{leaves.length}}</h4>
    </div>

    <div class="dashboard-card approved-card">
      <p>Approved</p>
      <h4>{{approvedCount}}</h4>
    </div>

    <div class="dashboard-card rejected-card">
      <p>Rejected</p>
      <h4>{{rejectedCount}}</h4>
    </div>

    <div class="dashboard-card pending-card">
      <p>Pending</p>
      <h4>{{pendingCount}}</h4>
    </div>

    <div class="dashboard-card cancelled-card">
      <p>Cancelled</p>
      <h4>{{cancelledCount}}</h4>
    </div>

  </div>

  <!-- APPLY BUTTON -->

  <div class="apply-section">
    <button class="apply-button" (click)="toggleForm()">
      Apply Leave
    </button>
  </div>

  <!-- AG GRID -->

  <div *ngIf="leaves.length > 0" class="ag-grid-container" [class.grid-disabled]="showForm">

    <ag-grid-angular style="width:100%;height:600px" class="ag-theme-alpine" [rowData]="leaves"
      [columnDefs]="columnDefs" [gridOptions]="gridOptions" [pagination]="true" [paginationPageSize]="20"
      [animateRows]="true" [domLayout]="isMobile ? 'autoHeight' : 'normal'">
    </ag-grid-angular>

  </div>

  <!-- FORM -->

  <div class="form-overlay" *ngIf="showForm">

    <div class="form-panel">

      <div class="form-header">
        <h4>Apply Leave</h4>
        <span class="form-close" (click)="closeForm()">✖</span>
      </div>

      <form (ngSubmit)="submitLeave()" #leaveForm="ngForm">

        <div class="form-group">
          <label>Leave Type</label>
          <select [(ngModel)]="leave.LeaveTypeId" name="LeaveTypeId" required>
            <option value="">Select leave type</option>
            <option *ngFor="let type of leaveTypes" [value]="type.Id">
              {{type.Name}}
            </option>
          </select>
        </div>

        <div class="date-row">

          <div class="form-group">
            <label>From Date</label>
            <input type="date" [(ngModel)]="leave.FromDate" name="FromDate" (change)="calculateDays()" required>
          </div>

          <div class="form-group">
            <label>To Date</label>
            <input type="date" [(ngModel)]="leave.ToDate" name="ToDate" (change)="calculateDays()" required>
          </div>

        </div>

        <div class="form-group total-days" *ngIf="leave.TotalDays">
          <label>Total Days</label>
          <input [value]="leave.TotalDays" readonly>
        </div>

        <div class="form-group">
          <label>Reason</label>
          <input [(ngModel)]="leave.Reason" name="Reason" required>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea rows="3" [(ngModel)]="leave.Description" name="Description"></textarea>
        </div>

        <div class="form-buttons">
          <button class="save-btn" type="submit" [disabled]="!leaveForm.form.valid">Apply</button>
          <button type="button" class="cancel-form-btn" (click)="closeForm()">Close</button>
        </div>

        <div class="message-popup" *ngIf="errorMessage || successMessage">
          <div class="popup-content" [ngClass]="{
     'error': errorMessage,
     'success': successMessage
   }">

            <span>{{ errorMessage || successMessage }}</span>

            <button class="close-btn" (click)="errorMessage=''; successMessage=''">
              ✖
            </button>

          </div>
        </div>

      </form>

    </div>

  </div>

</div>
