<div class="container-fluid py-3">
  <div class="row">
    <div class="col">
      <div class="card">
        <!-- Header -->
        <div class="card-header bg-white border-bottom">
          <div class="d-flex justify-content-between align-items-center py-1">
            <div class="d-flex align-items-center">
              <h5 class="mb-0">
                <i class="mdi mdi-account-group text-primary me-2"></i>
                Timesheets
              </h5>

              <span class="badge bg-light text-dark ms-3">
                <span class="text-primary fw-bold">{{
                  getTotalRowsCount()
                }}</span>
                timesheets
              </span>
            </div>

            <div class="d-flex align-items-center gap-2">
              <a
                class="btn btn-primary btn-sm d-flex align-items-center"
                (click)="openAddEditTimesheet()"
                title="Create new timesheet"
              >
                CREATE TIMESHEET
              </a>
            </div>
          </div>
        </div>

        <!-- Grid -->
        <div class="card-body p-0">
          <div *ngIf="timesheets.length > 0" class="ag-grid-container">
            <ag-grid-angular
              style="width: 100%; height: 640px"
              class="ag-theme-alpine"
              [rowData]="timesheets"
              [columnDefs]="columnDefs"
              [defaultColDef]="defaultColDef"
              [gridOptions]="gridOptions"
              [pagination]="true"
              [paginationPageSize]="20"
              [suppressCellFocus]="true"
              [animateRows]="true"
              [rowSelection]="'single'"
              [domLayout]="isMobile ? 'autoHeight' : 'normal'"
              (gridReady)="onGridReady($event)"
            >
            </ag-grid-angular>
          </div>

          <div
            *ngIf="timesheets.length === 0"
            class="p-4 text-center text-muted"
          >
            No timesheets found
          </div>

          <!-- Footer -->
          <div
            *ngIf="timesheets.length > 0"
            class="card-footer bg-white border-top"
          >
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex gap-3">
                <small class="text-muted">
                  <span class="fw-medium">{{ getTotalRowsCount() }}</span> total
                </small>
                <small class="text-muted">
                  <i class="mdi mdi-check-circle-outline text-success me-1"></i>
                  <span class="fw-medium">{{ getActiveTimesheetCount() }}</span>
                  active
                </small>
                <small class="text-muted">
                  <i class="mdi mdi-close-circle-outline text-danger me-1"></i>
                  <span class="fw-medium">{{
                    getInactiveTimesheetCount()
                  }}</span>
                  inactive
                </small>
              </div>

              <small class="text-muted">
                <i
                  class="mdi me-1"
                  [class.mdi-cellphone]="isMobile"
                  [class.mdi-monitor]="!isMobile"
                ></i>
                {{ isMobile ? "Mobile" : "Desktop" }}
              </small>
            </div>
          </div>
        </div>

        <!-- Child -->
        <app-add-timesheet
          *ngIf="showSidebar"
          [isVisible]="showSidebar"
          [mode]="mode"
          [timesheet]="selectedTimesheet"
          [taskitems]="taskitems"
          [taskcodes]="taskcodes"
          [existingTimesheets]="timesheets"
          (closeSidebar)="onCloseSidebar()"
          (saveTimesheet)="onSaveTimesheet($event)"
        ></app-add-timesheet>

        <!-- Delete -->
        <app-delete-confirmation
          *ngIf="showDeletePopup"
          title="Delete Timesheet"
          message="Do you really want to delete this Timesheet?"
          (confirm)="confirmDelete()"
          (cancel)="closePopup()"
        ></app-delete-confirmation>
      </div>
    </div>
  </div>
</div>
