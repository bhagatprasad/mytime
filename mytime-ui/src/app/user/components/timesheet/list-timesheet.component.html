<div class="container-fluid py-3">
  <div class="row">
    <div class="col">
      <div class="card">
        <div class="card-header bg-white border-bottom">
          <div class="d-flex justify-content-between align-items-center py-1">
            <!-- Left: Title -->
            <div class="d-flex align-items-center">
              <h5 class="mb-0">
                <i class="mdi mdi-account-group text-primary me-2"></i>
                Timesheets
              </h5>
              <span class="badge bg-light text-dark ms-3">
                <span class="text-primary fw-bold">{{
                  getTotalRowsCount()
                }}</span>
                timesheets
              </span>
            </div>

            <!-- Right Button -->
            <div class="d-flex align-items-center gap-2">
              <div class="d-flex gap-2 ms-3">
                <div class="apply-section" *ngIf="!showForm">
                  <button
                    class="create-btn btn-gradient"
                    (click)="toggleForm()"
                  >
                    CREATE TIMESHEET
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card-body p-0">
          <!--  SHOW FORM -->
          <div *ngIf="showForm" class="p-3">
            <app-add-timesheet></app-add-timesheet>

            <!-- optional close button -->
            <div class="mt-3 text-end">
              <button class="btn btn-secondary" (click)="closeForm()">
                Close Form
              </button>
            </div>
          </div>

          <!--  SHOW GRID ONLY WHEN FORM IS HIDDEN -->
          <div
            *ngIf="!showForm && timesheets.length > 0"
            class="ag-grid-container"
          >
            <ag-grid-angular
              style="width: 100%; height: 640px"
              class="ag-theme-alpine"
              [rowData]="timesheets"
              [columnDefs]="columnDefs"
              [defaultColDef]="defaultColDef"
              [gridOptions]="gridOptions"
              (gridReady)="onGridReady($event)"
              [pagination]="true"
              [paginationPageSize]="20"
              [suppressCellFocus]="true"
              [animateRows]="true"
              [rowSelection]="'single'"
              [domLayout]="isMobile ? 'autoHeight' : 'normal'"
            >
            </ag-grid-angular>
          </div>

          <!-- Footer -->
          <div
            *ngIf="!showForm && timesheets.length > 0"
            class="card-footer bg-white border-top"
          >
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex gap-3">
                <small class="text-muted">
                  <span class="fw-medium">{{ getTotalRowsCount() }}</span>
                  total
                </small>
                <small class="text-muted">
                  <i class="mdi mdi-check-circle-outline text-success me-1"></i>
                  <span class="fw-medium">{{ getActiveTimesheetCount() }}</span>
                  active
                </small>
                <small class="text-muted">
                  <i class="mdi mdi-close-circle-outline text-danger me-1"></i>
                  <span class="fw-medium">{{
                    getInactiveTimesheetCount()
                  }}</span>
                  inactive
                </small>
              </div>

              <small class="text-muted">
                <i
                  class="mdi me-1"
                  [class.mdi-cellphone]="isMobile"
                  [class.mdi-monitor]="!isMobile"
                ></i>
                {{ isMobile ? "Mobile" : "Desktop" }}
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
