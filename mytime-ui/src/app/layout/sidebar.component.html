<nav
  class="sidebar sidebar-offcanvas"
  id="sidebar"
  [ngClass]="{
    'mobile-visible':  isMobileScreen &&  isMobileMenuOpen,
    'mobile-hidden':   isMobileScreen && !isMobileMenuOpen,
    'desktop-visible': !isMobileScreen
  }"
>
  <ng-container *ngIf="userContext$ | async as ctx">

    <div class="user-profile">
      <div class="user-image">
        <img src="assets/images/faces/face28.png" alt="User" />
      </div>
      <div class="user-name">{{ ctx.user?.fullName }}</div>
      <div class="user-designation">
        {{ ctx.isAdmin ? 'Administrator' : 'User' }}
      </div>
    </div>

    <!-- Admin sidebar -->
    <app-admin-sidebar *ngIf="ctx.isAdmin"></app-admin-sidebar>

    <!-- Regular user sidebar -->
    <app-user-sidebar *ngIf="!ctx.isAdmin"></app-user-sidebar>

  </ng-container>
</nav>

<!-- Mobile overlay — visible only when sidebar is open on mobile -->
<div
  class="sidebar-overlay"
  [class.active]="isMobileScreen && isMobileMenuOpen"
  (click)="closeSidebarOnMobile()"
></div>
